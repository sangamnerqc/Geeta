<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bhagavad Gita Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Bhagavad Gita Explorer</h2>

<!-- Chapter Dropdown -->
<select id="chapterSelect">
  <option value="">Select Chapter</option>
</select>

<!-- Verse Dropdown -->
<select id="verseSelect">
  <option value="">Select Verse</option>
</select>

<!-- Language Dropdown -->
<select id="languageSelect">
  <option value="english">English</option>
  <option value="hindi">Hindi</option>
</select>

<div id="output">
  <h3>Sanskrit:</h3>
  <p id="sanskrit"></p>

  <h3>Translation:</h3>
  <p id="translation"></p>
</div>

<script>

let allData = [];

// Load Chapters 1–18
const chapterSelect = document.getElementById("chapterSelect");
for (let i = 1; i <= 18; i++) {
  let option = document.createElement("option");
  option.value = i;
  option.textContent = "Chapter " + i;
  chapterSelect.appendChild(option);
}

// Fetch CSV
fetch("Main.csv")
.then(response => response.text())
.then(text => {

  const rows = text.trim().split(/\r?\n/);

  // Skip header row
  for (let i = 1; i < rows.length; i++) {

    const cols = rows[i].split(",");

    if (cols.length >= 7) {

      allData.push({
        chapter: cols[2].trim(),       // 3rd column
        verse: cols[3].trim(),         // 4th column
        sanskrit: cols[4].trim(),      // 5th column
        hindi: cols[5].trim(),         // 6th column
        english: cols[6].trim()        // 7th column
      });

    }
  }

})
.catch(error => {
  alert("Error loading CSV file");
  console.log(error);
});


// When Chapter Changes
chapterSelect.addEventListener("change", function() {

  const verseSelect = document.getElementById("verseSelect");
  verseSelect.innerHTML = '<option value="">Select Verse</option>';

  document.getElementById("sanskrit").textContent = "";
  document.getElementById("translation").textContent = "";

  if (!this.value) return;

  const verses = allData
    .filter(item => item.chapter === this.value)
    .sort((a,b) => Number(a.verse) - Number(b.verse));

  verses.forEach(v => {
    let option = document.createElement("option");
    option.value = v.verse;
    option.textContent = "Verse " + v.verse;
    verseSelect.appendChild(option);
  });

});


// When Verse or Language Changes
document.getElementById("verseSelect").addEventListener("change", showVerse);
document.getElementById("languageSelect").addEventListener("change", showVerse);

function showVerse() {

  const chapter = chapterSelect.value;
  const verse = document.getElementById("verseSelect").value;
  const language = document.getElementById("languageSelect").value;

  if (!chapter || !verse) return;

  const match = allData.find(item =>
    item.chapter === chapter && item.verse === verse
  );

  if (match) {
    document.getElementById("sanskrit").textContent = match.sanskrit;
    document.getElementById("translation").textContent = match[language];
  }

}

</script>

</body>
</html>
