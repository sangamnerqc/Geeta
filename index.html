<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bhagavad Gita Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Bhagavad Gita Explorer</h2>

<select id="chapterSelect">
    <option value="">Select Chapter</option>
</select>

<select id="verseSelect">
    <option value="">Select Verse</option>
</select>

<select id="languageSelect">
    <option value="hindi">Hindi</option>
    <option value="marathi">Marathi</option>
</select>

<div id="output">
    <h3>Sanskrit:</h3>
    <p id="sanskrit"></p>

    <h3>Translation:</h3>
    <p id="translation"></p>
</div>

<script>

let allData = [];

fetch("Main.csv")
    .then(response => response.text())
    .then(data => {
        const rows = data.split("\n").slice(1);

        rows.forEach(row => {
            const cols = row.split(",");
            if(cols.length >= 5){
                allData.push({
                    chapter: cols[0].trim(),
                    verse: cols[1].trim(),
                    sanskrit: cols[2].trim(),
                    hindi: cols[3].trim(),
                    marathi: cols[4].trim()
                });
            }
        });

        loadChapters();
    });

function loadChapters(){
    const chapters = [...new Set(allData.map(v => v.chapter))];
    const chapterSelect = document.getElementById("chapterSelect");

    chapters.forEach(ch => {
        let option = document.createElement("option");
        option.value = ch;
        option.textContent = "Chapter " + ch;
        chapterSelect.appendChild(option);
    });
}

document.getElementById("chapterSelect").addEventListener("change", function(){
    const verseSelect = document.getElementById("verseSelect");
    verseSelect.innerHTML = '<option value="">Select Verse</option>';

    const filtered = allData.filter(v => v.chapter === this.value);

    filtered.forEach(v => {
        let option = document.createElement("option");
        option.value = v.verse;
        option.textContent = "Verse " + v.verse;
        verseSelect.appendChild(option);
    });
});

document.getElementById("verseSelect").addEventListener("change", showVerse);
document.getElementById("languageSelect").addEventListener("change", showVerse);

function showVerse(){
    const chapter = document.getElementById("chapterSelect").value;
    const verse = document.getElementById("verseSelect").value;
    const language = document.getElementById("languageSelect").value;

    const found = allData.find(v => v.chapter === chapter && v.verse === verse);

    if(found){
        document.getElementById("sanskrit").innerText = found.sanskrit;
        document.getElementById("translation").innerText = found[language];
    }
}

</script>

</body>
</html>
