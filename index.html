<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bhagavad Gita Explorer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Main Content -->
<div class="container">

    <h2>🕉 Bhagavad Gita Explorer</h2>

    <div class="controls">

        <select id="chapterSelect" disabled>
            <option value="">Select Chapter</option>
        </select>

        <select id="verseSelect" disabled>
            <option value="">Select Verse</option>
        </select>

        <select id="languageSelect">
            <option value="english">English</option>
            <option value="hindi">Hindi</option>
        </select>

    </div>

    <div id="output">
        <h3 id="reference"></h3>

        <h3>Sanskrit</h3>
        <p id="sanskrit"></p>

        <h3>Translation</h3>
        <p id="translation"></p>
    </div>

    <div id="loading">Loading Bhagavad Gita...</div>

</div>

<!-- Footer (OUTSIDE container) -->
<footer class="footer">
    गीता सेवी अजित करंजेकर
</footer>

<script>

let allData = [];

const chapterSelect = document.getElementById("chapterSelect");
const verseSelect = document.getElementById("verseSelect");
const languageSelect = document.getElementById("languageSelect");
const loadingDiv = document.getElementById("loading");

// CSV Safe Parser
function parseCSV(text) {
  const rows = text.split(/\r?\n/);
  const data = [];

  for (let i = 1; i < rows.length; i++) {
    let cols = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if (!cols || cols.length < 7) continue;

    data.push({
      chapter: cols[2].replace(/"/g, '').trim(),
      verse: cols[3].replace(/"/g, '').trim(),
      sanskrit: cols[4].replace(/"/g, '').trim(),
      hindi: cols[5].replace(/"/g, '').trim(),
      english: cols[6].replace(/"/g, '').trim()
    });
  }

  return data;
}

// Load CSV
fetch("Main.csv")
.then(response => response.text())
.then(text => {

  allData = parseCSV(text);

  if (allData.length === 0) {
    loadingDiv.textContent = "No data found in CSV.";
    return;
  }

  loadChapters();
  chapterSelect.disabled = false;
  loadingDiv.style.display = "none";

})
.catch(error => {
  loadingDiv.textContent = "Error loading CSV file.";
  console.error(error);
});

// Load Chapters
function loadChapters() {

  const uniqueChapters = [...new Set(allData.map(item => item.chapter))];

  uniqueChapters
    .sort((a,b) => Number(a) - Number(b))
    .forEach(ch => {
      let option = document.createElement("option");
      option.value = ch;
      option.textContent = "Chapter " + ch;
      chapterSelect.appendChild(option);
    });
}

// Chapter Change
chapterSelect.addEventListener("change", function() {

  verseSelect.innerHTML = '<option value="">Select Verse</option>';
  verseSelect.disabled = true;

  clearOutput();

  if (!this.value) return;

  const filtered = allData.filter(item => item.chapter === this.value);
  const uniqueVerses = [...new Set(filtered.map(item => item.verse))];

  uniqueVerses
    .sort((a,b) => Number(a) - Number(b))
    .forEach(v => {
      let option = document.createElement("option");
      option.value = v;
      option.textContent = "Verse " + v;
      verseSelect.appendChild(option);
    });

  verseSelect.disabled = false;
});

// Show Verse
verseSelect.addEventListener("change", showVerse);
languageSelect.addEventListener("change", showVerse);

function showVerse() {

  const chapter = chapterSelect.value;
  const verse = verseSelect.value;
  const language = languageSelect.value;

  if (!chapter || !verse) return;

  const match = allData.find(item =>
    item.chapter === chapter && item.verse === verse
  );

  if (match) {

    document.getElementById("reference").textContent =
      "Chapter " + chapter + " • Verse " + verse;

    document.getElementById("sanskrit").textContent = match.sanskrit;
    document.getElementById("translation").textContent = match[language];
  }
}

function clearOutput() {
  document.getElementById("reference").textContent = "";
  document.getElementById("sanskrit").textContent = "";
  document.getElementById("translation").textContent = "";
}

</script>

</body>
</html>
