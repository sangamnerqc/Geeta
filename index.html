<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bhagavad Gita Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Bhagavad Gita Explorer</h2>

<select id="chapterSelect"></select>
<select id="verseSelect"></select>

<select id="languageSelect">
  <option value="english">English</option>
  <option value="hindi">Hindi</option>
</select>

<div id="output">
  <h3>Sanskrit:</h3>
  <p id="sanskrit"></p>
  <h3>Translation:</h3>
  <p id="translation"></p>
</div>

<script>

let allData = [];

// Load chapters 1–18 immediately
const chapterSelect = document.getElementById("chapterSelect");
chapterSelect.innerHTML = '<option value="">Select Chapter</option>';

for (let i = 1; i <= 18; i++) {
  let opt = document.createElement("option");
  opt.value = i;
  opt.textContent = "Chapter " + i;
  chapterSelect.appendChild(opt);
}

// Load CSV safely
fetch("Main.csv")
  .then(res => {
    if (!res.ok) throw new Error("CSV not found");
    return res.text();
  })
  .then(text => {

    const rows = text.trim().split(/\r?\n/);

    for (let i = 1; i < rows.length; i++) {
      let cols = rows[i].split(",");

      if (cols.length >= 5) {
        allData.push({
          chapter: cols[0].trim(),
          verse: cols[1].trim(),
          sanskrit: cols[2].trim(),
          english: cols[3].trim(),
          hindi: cols[4].trim()
        });
      }
    }

  })
  .catch(err => {
    alert("Error loading CSV. Check file name and location.");
    console.log(err);
  });


// Chapter change
chapterSelect.addEventListener("change", function() {

  const verseSelect = document.getElementById("verseSelect");
  verseSelect.innerHTML = '<option value="">Select Verse</option>';

  document.getElementById("sanskrit").textContent = "";
  document.getElementById("translation").textContent = "";

  if (!this.value) return;

  const verses = allData
    .filter(v => v.chapter === this.value)
    .sort((a,b) => Number(a.verse) - Number(b.verse));

  verses.forEach(v => {
    let opt = document.createElement("option");
    opt.value = v.verse;
    opt.textContent = "Verse " + v.verse;
    verseSelect.appendChild(opt);
  });
});


// Verse or language change
document.getElementById("verseSelect").addEventListener("change", showVerse);
document.getElementById("languageSelect").addEventListener("change", showVerse);

function showVerse() {

  const ch = chapterSelect.value;
  const vs = document.getElementById("verseSelect").value;
  const lang = document.getElementById("languageSelect").value;

  if (!ch || !vs) return;

  const match = allData.find(v => v.chapter === ch && v.verse === vs);

  if (match) {
    document.getElementById("sanskrit").textContent = match.sanskrit;
    document.getElementById("translation").textContent = match[lang];
  }
}

</script>

</body>
</html>
