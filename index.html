<script>

let allData = [];

// Load CSV
fetch("./Main.csv")
  .then(response => response.text())
  .then(text => {

    const rows = text.trim().split(/\r?\n/);

    // Skip header
    for (let i = 1; i < rows.length; i++) {

      const cols = rows[i].split(",");

      if (cols.length < 5) continue;

      allData.push({
        chapter: cols[0].trim(),
        verse: cols[1].trim(),
        sanskrit: cols[2].trim(),
        english: cols[3].trim(),
        hindi: cols[4].trim()
      });
    }

    loadChapters();
  })
  .catch(error => console.log("CSV Error:", error));


// Fixed Chapters 1–18
function loadChapters() {

  const chapterSelect = document.getElementById("chapterSelect");
  chapterSelect.innerHTML = '<option value="">Select Chapter</option>';

  for (let i = 1; i <= 18; i++) {
    let option = document.createElement("option");
    option.value = i.toString();
    option.textContent = "Chapter " + i;
    chapterSelect.appendChild(option);
  }
}


// Chapter change
document.getElementById("chapterSelect").addEventListener("change", function () {

  const chapter = this.value;
  const verseSelect = document.getElementById("verseSelect");

  verseSelect.innerHTML = '<option value="">Select Verse</option>';
  clearOutput();

  if (!chapter) return;

  const verses = allData
    .filter(item => item.chapter === chapter)
    .sort((a, b) => Number(a.verse) - Number(b.verse));

  verses.forEach(v => {
    let option = document.createElement("option");
    option.value = v.verse;
    option.textContent = "Verse " + v.verse;
    verseSelect.appendChild(option);
  });
});


// Verse or Language change
document.getElementById("verseSelect").addEventListener("change", showVerse);
document.getElementById("languageSelect").addEventListener("change", showVerse);


function showVerse() {

  const chapter = document.getElementById("chapterSelect").value;
  const verse = document.getElementById("verseSelect").value;
  const language = document.getElementById("languageSelect").value;

  if (!chapter || !verse) return;

  const match = allData.find(item =>
    item.chapter === chapter && item.verse === verse
  );

  if (match) {
    document.getElementById("sanskrit").textContent = match.sanskrit;
    document.getElementById("translation").textContent = match[language];
  }
}


function clearOutput() {
  document.getElementById("sanskrit").textContent = "";
  document.getElementById("translation").textContent = "";
}

</script>
