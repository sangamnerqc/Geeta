<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bhagavad Gita Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Bhagavad Gita Explorer</h2>

<!-- Chapter Dropdown -->
<select id="chapterSelect">
  <option value="">Select Chapter</option>
</select>

<!-- Verse Dropdown -->
<select id="verseSelect">
  <option value="">Select Verse</option>
</select>

<!-- Language Dropdown -->
<select id="languageSelect">
  <option value="english">English</option>
  <option value="hindi">Hindi</option>
</select>

<div id="output">
  <h3>Sanskrit:</h3>
  <p id="sanskrit"></p>

  <h3>Translation:</h3>
  <p id="translation"></p>
</div>

<script>

let allData = [];

// Load CSV
fetch("Main.csv")
.then(response => response.text())
.then(text => {

  const rows = text.trim().split(/\r?\n/);

  for (let i = 1; i < rows.length; i++) {

    const cols = rows[i].split(",");

    if (cols.length >= 7) {

      allData.push({
        chapter: cols[2].trim(),   // 3rd column
        verse: cols[3].trim(),     // 4th column
        sanskrit: cols[4].trim(),
        hindi: cols[5].trim(),
        english: cols[6].trim()
      });

    }
  }

  loadChapters();   // Load chapters AFTER CSV loads

})
.catch(error => {
  alert("Error loading CSV");
  console.log(error);
});


// Dynamically Load Chapters from CSV
function loadChapters() {

  const chapterSelect = document.getElementById("chapterSelect");

  // Get unique chapter numbers
  const uniqueChapters = [...new Set(allData.map(item => item.chapter))];

  uniqueChapters
    .sort((a,b) => Number(a) - Number(b))
    .forEach(ch => {

      let option = document.createElement("option");
      option.value = ch;
      option.textContent = "Chapter " + ch;
      chapterSelect.appendChild(option);

    });
}


// When Chapter Changes
document.getElementById("chapterSelect").addEventListener("change", function() {

  const selectedChapter = this.value;
  const verseSelect = document.getElementById("verseSelect");

  verseSelect.innerHTML = '<option value="">Select Verse</option>';

  document.getElementById("sanskrit").textContent = "";
  document.getElementById("translation").textContent = "";

  if (!selectedChapter) return;

  // Get verses only for selected chapter
  const filteredVerses = allData
    .filter(item => item.chapter === selectedChapter);

  const uniqueVerses = [...new Set(filteredVerses.map(item => item.verse))];

  uniqueVerses
    .sort((a,b) => Number(a) - Number(b))
    .forEach(v => {

      let option = document.createElement("option");
      option.value = v;
      option.textContent = "Verse " + v;
      verseSelect.appendChild(option);

    });

});


// Show Verse
document.getElementById("verseSelect").addEventListener("change", showVerse);
document.getElementById("languageSelect").addEventListener("change", showVerse);

function showVerse() {

  const chapter = document.getElementById("chapterSelect").value;
  const verse = document.getElementById("verseSelect").value;
  const language = document.getElementById("languageSelect").value;

  if (!chapter || !verse) return;

  const match = allData.find(item =>
    item.chapter === chapter && item.verse === verse
  );

  if (match) {
    document.getElementById("sanskrit").textContent = match.sanskrit;
    document.getElementById("translation").textContent = match[language];
  }

}

</script>

</body>
</html>
