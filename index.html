<script>

let allData = [];

fetch("./Main.csv")
    .then(response => response.text())
    .then(data => {

        const lines = data.trim().split(/\r?\n/);
        const headers = lines[0].split(",");

        for (let i = 1; i < lines.length; i++) {

            // Proper CSV split (handles commas inside quotes)
            const cols = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);

            if (!cols || cols.length < 5) continue;

            allData.push({
                chapter: cols[0].replace(/"/g, "").trim(),
                verse: cols[1].replace(/"/g, "").trim(),
                sanskrit: cols[2].replace(/"/g, "").trim(),
                hindi: cols[3].replace(/"/g, "").trim(),
                marathi: cols[4].replace(/"/g, "").trim()
            });
        }

        loadChapters();
    })
    .catch(err => console.error("CSV Load Error:", err));


function loadChapters() {

    const chapterSelect = document.getElementById("chapterSelect");
    chapterSelect.innerHTML = '<option value="">Select Chapter</option>';

    const chapters = [...new Set(allData.map(v => v.chapter))];

    chapters.forEach(ch => {
        const option = document.createElement("option");
        option.value = ch;
        option.textContent = ch;   // exactly as CSV
        chapterSelect.appendChild(option);
    });
}


document.getElementById("chapterSelect").addEventListener("change", function () {

    const selectedChapter = this.value;
    const verseSelect = document.getElementById("verseSelect");

    verseSelect.innerHTML = '<option value="">Select Verse</option>';

    const filteredVerses = allData.filter(v => v.chapter === selectedChapter);

    filteredVerses.forEach(v => {
        const option = document.createElement("option");
        option.value = v.verse;
        option.textContent = v.verse;   // exactly as CSV
        verseSelect.appendChild(option);
    });

    clearOutput();
});


document.getElementById("verseSelect").addEventListener("change", showVerse);
document.getElementById("languageSelect").addEventListener("change", showVerse);


function showVerse() {

    const chapter = document.getElementById("chapterSelect").value;
    const verse = document.getElementById("verseSelect").value;
    const language = document.getElementById("languageSelect").value;

    if (!chapter || !verse) return;

    const found = allData.find(v =>
        v.chapter === chapter && v.verse === verse
    );

    if (found) {
        document.getElementById("sanskrit").innerText = found.sanskrit;
        document.getElementById("translation").innerText = found[language];
    }
}


function clearOutput() {
    document.getElementById("sanskrit").innerText = "";
    document.getElementById("translation").innerText = "";
}

</script>
